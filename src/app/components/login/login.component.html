<app-accessibility-bar></app-accessibility-bar>
<div class="page-auth">
  <div class="auth-left">
    <a routerLink="/" class="logo">Mente Digital <span>AAA</span></a>
    <div style="font-size:72px;margin-bottom:1.5rem">📚</div>
    <h2>Bienvenido de vuelta</h2>
    <p>Continúa aprendiendo donde lo dejaste. Tu progreso te espera.</p>
    <div style="display:flex;gap:2rem;margin-top:2.5rem">
      <div style="text-align:center"><div style="font-family:'Fraunces',serif;font-size:28px;font-weight:900;color:#9FE1CB">50K+</div><div style="font-size:12px;color:#9FE1CB">Estudiantes</div></div>
      <div style="text-align:center"><div style="font-family:'Fraunces',serif;font-size:28px;font-weight:900;color:#9FE1CB">200+</div><div style="font-size:12px;color:#9FE1CB">Cursos</div></div>
      <div style="text-align:center"><div style="font-family:'Fraunces',serif;font-size:28px;font-weight:900;color:#9FE1CB">98%</div><div style="font-size:12px;color:#9FE1CB">Satisfacción</div></div>
    </div>
  </div>
  <div class="auth-right">
    <div class="auth-form">
      <h1>Iniciar sesión</h1>
      <p class="sub">¿No tienes cuenta? <a routerLink="/register">Regístrate gratis</a></p>
      <div *ngIf="error" class="form-error" style="background:#FFEAEA;color:#CC2222;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:1rem;border:1px solid #FFCCCC;">{{ error }}</div>
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="tucorreo@ejemplo.com" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary form-submit" style="width:100%" [disabled]="loading" (click)="submit()">
        {{ loading ? '✓ Entrando...' : 'Iniciar sesión' }}
      </button>
      <p class="form-footer" style="margin-top:1.5rem"><a routerLink="/">← Volver al inicio</a></p>
    </div>
  </div>
</div>
